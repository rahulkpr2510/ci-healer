# backend/nixpacks.toml
# Used by Railway when not using Dockerfile builder (nixpacks auto-detection)

[phases.setup]
nixPkgs = ["python312", "postgresql", "git"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
